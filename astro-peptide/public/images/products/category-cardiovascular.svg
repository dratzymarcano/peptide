<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300" role="img" aria-label="Cardiovascular research peptide vial">
  <defs>
    <linearGradient id="bgC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F8FAFC"/><stop offset="1" stop-color="#E6F1F8"/>
    </linearGradient>
    <linearGradient id="vialC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#E6EEF4"/>
    </linearGradient>
  </defs>
  <rect width="300" height="300" fill="url(#bgC)"/>
  <!-- vial -->
  <g transform="translate(110 60)">
    <rect x="6" y="0" width="68" height="14" rx="3" fill="#475569"/>
    <rect x="10" y="14" width="60" height="8" fill="#94A3B8"/>
    <path d="M4 22 H76 V160 a16 16 0 0 1 -16 16 H20 a16 16 0 0 1 -16 -16 Z" fill="url(#vialC)" stroke="#CBD5E1" stroke-width="1.5"/>
    <rect x="14" y="60" width="52" height="80" fill="#FEE2E2" opacity="0.85"/>
    <rect x="14" y="60" width="52" height="2" fill="#DC2626" opacity="0.4"/>
    <text x="40" y="115" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" font-weight="700" fill="#991B1B">CV</text>
  </g>
  <!-- ECG line -->
  <g transform="translate(0 230)" stroke="#005B8C" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M20 20 L70 20 L80 5 L90 35 L100 0 L110 20 L160 20 L170 8 L180 32 L190 20 L240 20 L250 5 L260 35 L270 20 L290 20"/>
  </g>
  <!-- badge -->
  <g transform="translate(20 22)">
    <rect width="100" height="22" rx="11" fill="#005B8C"/>
    <text x="50" y="15" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#fff" letter-spacing="0.08em">CARDIOVASCULAR</text>
  </g>
</svg>
